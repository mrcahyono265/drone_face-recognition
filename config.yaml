camera:
  source: 1
  type: "video"
  rtsp_url: "rtsp://192.168.1.1:7070/webcam"
  video_dir: "test"

dataset:
  root: "dataset"
  enrollment_images: "enrollment/images"
  enrollment_videos: "enrollment/videos"
  supported_image_formats: [".jpg", ".jpeg"]
  supported_video_formats: [".mp4"]

recognition:
  similarity_threshold: 0.39
  model_name: "buffalo_sc"
  det_size: [960, 960]

spoofing:
  model_path: "models/MiniFASNetV2.onnx"
  liveness_threshold: 0.85

processing:
  provider: "cuda"
  frame_skip: 0
  fps_smoothing: 0.9
  headless: true

database:
  mode: "multiple"
  embeddings_dir: "database/embeddings"
  path: "database/face_db.pkl"

enrollment:
  duplicate_threshold: 0.92
  sampling_interval_ms: 100
  validation:
    min_face_size: 50
    min_face_confidence: 0.5
    max_blur_score: 1000

output:
  snapshot_dir: "inference_output"
  video_dir: "inference_output"

reports:
  enrollment_dir: "reports/enrollment"

logging:
  level: "INFO"
  verbose: false

debug:
  csv_enabled: true
  csv_path: "reports/debug_latest.csv"
